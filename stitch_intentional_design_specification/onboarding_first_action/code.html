<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#6e2c00",
              "on-primary-container": "#90a8ff",
              "secondary-container": "#dce2f3",
              "on-surface-variant": "#444651",
              "surface-container-highest": "#dce2f7",
              "on-secondary-fixed-variant": "#404754",
              "on-primary": "#ffffff",
              "on-tertiary-fixed-variant": "#773205",
              "inverse-primary": "#b6c4ff",
              "secondary-fixed": "#dce2f3",
              "on-surface": "#141b2b",
              "on-secondary": "#ffffff",
              "inverse-surface": "#293040",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdbcb",
              "tertiary": "#4b1c00",
              "surface-container": "#e9edff",
              "outline-variant": "#c5c5d3",
              "on-tertiary-fixed": "#341100",
              "error-container": "#ffdad6",
              "primary": "#00236f",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#b6c4ff",
              "primary-container": "#1e3a8a",
              "on-secondary-fixed": "#151c27",
              "surface-bright": "#f9f9ff",
              "surface-tint": "#4059aa",
              "secondary": "#585f6c",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f1f3ff",
              "error": "#ba1a1a",
              "on-secondary-container": "#5e6572",
              "surface-container-high": "#e1e8fd",
              "on-background": "#141b2b",
              "surface": "#f9f9ff",
              "inverse-on-surface": "#edf0ff",
              "on-primary-fixed-variant": "#264191",
              "on-tertiary-container": "#f39461",
              "outline": "#757682",
              "surface-dim": "#d3daef",
              "tertiary-fixed-dim": "#ffb691",
              "secondary-fixed-dim": "#c0c7d6",
              "on-error-container": "#93000a",
              "on-primary-fixed": "#00164e",
              "background": "#f9f9ff",
              "surface-variant": "#dce2f7",
              "primary-fixed": "#dce1ff"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .skills-accent { color: #8B5CF6; }
        .skills-bg { background-color: rgba(139, 92, 246, 0.1); }
        .skills-button { background-color: #8B5CF6; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#F9F9FF] dark:bg-[#0F0F14] z-50">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-slate-400 dark:text-slate-500 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-[#1E3A8A] dark:text-blue-400">Intentional</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 flex flex-col items-center px-6 pt-8 pb-32 max-w-lg mx-auto w-full">
<!-- Step Indicator -->
<div class="mb-8 flex flex-col items-center">
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-outline mb-4">Step 3 of 4</span>
<!-- Goal Chip: Skills -->
<div class="inline-flex items-center px-4 py-1.5 rounded-full skills-bg border border-[#8B5CF6]/20">
<span class="material-symbols-outlined text-[18px] skills-accent mr-2">psychology</span>
<span class="text-[0.6875rem] font-bold tracking-widest uppercase skills-accent">Skills</span>
</div>
</div>
<!-- Instruction Header -->
<div class="text-center mb-12">
<h2 class="text-[1.75rem] font-semibold leading-tight tracking-tight text-on-surface">What will you do daily?</h2>
</div>
<!-- Main Input Section -->
<div class="w-full space-y-10">
<!-- Text Input -->
<div class="relative group">
<input class="w-full h-[56px] bg-surface-container-low border-none rounded-2xl px-6 text-[1.375rem] font-medium placeholder:text-outline/50 focus:ring-2 focus:ring-[#8B5CF6]/50 transition-all text-on-surface" placeholder="e.g. Learn ML" type="text"/>
</div>
<!-- Type Toggle (Segmented Control) -->
<div class="bg-surface-container-low p-1.5 rounded-2xl flex w-full relative">
<button class="flex-1 py-3 text-sm font-semibold rounded-xl transition-all bg-surface-container-lowest text-on-surface shadow-sm">
                    Habit
                </button>
<button class="flex-1 py-3 text-sm font-semibold rounded-xl transition-all text-on-surface-variant hover:bg-surface-container-high/50">
                    Session
                </button>
</div>
<!-- Duration Selector (Visible when Session is active) -->
<div class="space-y-4">
<label class="text-[0.6875rem] font-bold tracking-widest uppercase text-outline ml-1">Session Duration</label>
<div class="flex overflow-x-auto pb-4 -mx-6 px-6 no-scrollbar gap-3">
<button class="flex-none px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-colors">30m</button>
<button class="flex-none px-6 py-3 rounded-full skills-bg border border-[#8B5CF6]/30 skills-accent font-bold text-sm">1h</button>
<button class="flex-none px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-colors">2h</button>
<button class="flex-none px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-colors">3h</button>
<button class="flex-none px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant font-medium text-sm hover:bg-surface-container-high transition-colors">4h+</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar as Continue Button -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-6 pb-10 pointer-events-none">
<button class="pointer-events-auto flex items-center justify-center skills-button text-white rounded-full w-full max-w-lg py-4 shadow-lg hover:opacity-90 transition-transform duration-200 active:scale-[0.98]">
<span class="font-['Inter'] font-bold text-sm tracking-widest uppercase mr-2">Continue</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</nav>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
