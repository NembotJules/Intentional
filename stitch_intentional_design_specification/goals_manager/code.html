<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e1e8fd",
              "background": "#f9f9ff",
              "on-primary-fixed": "#00164e",
              "primary-fixed-dim": "#b6c4ff",
              "surface-dim": "#d3daef",
              "on-secondary-fixed-variant": "#404754",
              "on-error": "#ffffff",
              "outline": "#757682",
              "on-tertiary-fixed-variant": "#773205",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#dce2f3",
              "secondary-container": "#dce2f3",
              "on-error-container": "#93000a",
              "tertiary": "#4b1c00",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#c0c7d6",
              "on-primary": "#ffffff",
              "on-primary-container": "#90a8ff",
              "on-tertiary-container": "#f39461",
              "inverse-surface": "#293040",
              "surface-bright": "#f9f9ff",
              "on-surface": "#141b2b",
              "primary": "#00236f",
              "on-secondary-container": "#5e6572",
              "surface-variant": "#dce2f7",
              "on-secondary-fixed": "#151c27",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb691",
              "inverse-on-surface": "#edf0ff",
              "primary-fixed": "#dce1ff",
              "surface-tint": "#4059aa",
              "surface": "#f9f9ff",
              "outline-variant": "#c5c5d3",
              "on-tertiary-fixed": "#341100",
              "on-surface-variant": "#444651",
              "on-background": "#141b2b",
              "surface-container": "#e9edff",
              "inverse-primary": "#b6c4ff",
              "secondary": "#585f6c",
              "primary-container": "#1e3a8a",
              "error-container": "#ffdad6",
              "error": "#ba1a1a",
              "tertiary-fixed": "#ffdbcb",
              "surface-container-low": "#f1f3ff",
              "surface-container-highest": "#dce2f7",
              "tertiary-container": "#6e2c00",
              "on-primary-fixed-variant": "#264191"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#F1F3FF] dark:bg-[#141B2B]">
<div class="flex items-center justify-between px-8 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#141B2B] dark:text-[#F9F9FF]" data-icon="menu">menu</span>
<h1 class="font-['Inter'] text-2xl font-semibold text-[#141B2B] dark:text-[#F9F9FF]">My Goals</h1>
</div>
<button class="text-[#1E3A8A] dark:text-blue-400 font-semibold text-lg active:scale-95 transition-transform">Edit</button>
</div>
</header>
<main class="px-4 pt-6 space-y-4 max-w-md mx-auto">
<!-- Physique Goal Card -->
<div class="relative overflow-hidden bg-surface-container-lowest rounded-[24px] p-4 flex items-center justify-between shadow-[0_8px_32px_rgba(20,27,43,0.06)] hover:opacity-80 transition-opacity">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#4A9EED]"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#4A9EED]/10 text-[#4A9EED]">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
</div>
<div>
<h3 class="text-[1.375rem] font-medium text-on-surface">Physique</h3>
<p class="text-[0.875rem] text-on-surface-variant font-medium">2 actions</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-[1.75rem] font-semibold text-on-surface">12h</span>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Finances Goal Card -->
<div class="relative overflow-hidden bg-surface-container-lowest rounded-[24px] p-4 flex items-center justify-between shadow-[0_8px_32px_rgba(20,27,43,0.06)] hover:opacity-80 transition-opacity">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#22C55E]"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#22C55E]/10 text-[#22C55E]">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<div>
<h3 class="text-[1.375rem] font-medium text-on-surface">Finances</h3>
<p class="text-[0.875rem] text-on-surface-variant font-medium">1 action</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-[1.75rem] font-semibold text-on-surface">2.5h</span>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Skills Goal Card -->
<div class="relative overflow-hidden bg-surface-container-lowest rounded-[24px] p-4 flex items-center justify-between shadow-[0_8px_32px_rgba(20,27,43,0.06)] hover:opacity-80 transition-opacity">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#8B5CF6]"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#8B5CF6]/10 text-[#8B5CF6]">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</div>
<div>
<h3 class="text-[1.375rem] font-medium text-on-surface">Skills</h3>
<p class="text-[0.875rem] text-on-surface-variant font-medium">3 actions</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-[1.75rem] font-semibold text-on-surface">18h</span>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Mind Goal Card -->
<div class="relative overflow-hidden bg-surface-container-lowest rounded-[24px] p-4 flex items-center justify-between shadow-[0_8px_32px_rgba(20,27,43,0.06)] hover:opacity-80 transition-opacity">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#F59E0B]"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#F59E0B]/10 text-[#F59E0B]">
<span class="material-symbols-outlined" data-icon="psychology">psychology</span>
</div>
<div>
<h3 class="text-[1.375rem] font-medium text-on-surface">Mind</h3>
<p class="text-[0.875rem] text-on-surface-variant font-medium">2 actions</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-[1.75rem] font-semibold text-on-surface">8h</span>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Add Goal CTA -->
<button class="w-full flex items-center justify-center gap-3 p-6 rounded-[24px] border-2 border-dashed border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary-container" data-icon="add">add</span>
<span class="font-['Inter'] text-on-surface font-semibold tracking-wide">Add Goal</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 flex justify-around items-center bg-[#F9F9FF]/80 dark:bg-[#0F0F14]/80 backdrop-blur-xl z-50 rounded-t-[24px] shadow-[0_-8px_32px_rgba(20,27,43,0.06)]">
<!-- Sanctuary -->
<div class="flex flex-col items-center justify-center text-[#141B2B]/60 dark:text-[#F9F9FF]/60 p-3 hover:bg-[#F1F3FF] dark:hover:bg-white/10 rounded-full transition-colors active:scale-90 cubic-bezier(0.4,0,0.2,1)">
<span class="material-symbols-outlined" data-icon="Shield">shield</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold tracking-widest uppercase mt-1">Sanctuary</span>
</div>
<!-- Goals (ACTIVE) -->
<div class="flex flex-col items-center justify-center bg-[#1E3A8A] text-white rounded-full p-3 shadow-lg active:scale-90 transition-transform cubic-bezier(0.4,0,0.2,1)">
<span class="material-symbols-outlined" data-icon="target">target</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold tracking-widest uppercase mt-1">Goals</span>
</div>
<!-- Focus -->
<div class="flex flex-col items-center justify-center text-[#141B2B]/60 dark:text-[#F9F9FF]/60 p-3 hover:bg-[#F1F3FF] dark:hover:bg-white/10 rounded-full transition-colors active:scale-90 cubic-bezier(0.4,0,0.2,1)">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold tracking-widest uppercase mt-1">Focus</span>
</div>
<!-- Profile -->
<div class="flex flex-col items-center justify-center text-[#141B2B]/60 dark:text-[#F9F9FF]/60 p-3 hover:bg-[#F1F3FF] dark:hover:bg-white/10 rounded-full transition-colors active:scale-90 cubic-bezier(0.4,0,0.2,1)">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold tracking-widest uppercase mt-1">Profile</span>
</div>
</nav>
</body></html>
