<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              "outline-variant": "#c5c5d3",
              "on-tertiary-container": "#f39461",
              "on-secondary-fixed": "#151c27",
              "on-surface-variant": "#444651",
              "background": "#f9f9ff",
              "secondary": "#585f6c",
              "primary-fixed": "#dce1ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#dce2f3",
              "surface-bright": "#f9f9ff",
              "on-primary-fixed-variant": "#264191",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdbcb",
              "surface-container-low": "#f1f3ff",
              "on-secondary": "#ffffff",
              "tertiary-container": "#6e2c00",
              "on-primary-fixed": "#00164e",
              "outline": "#757682",
              "surface-container-high": "#e1e8fd",
              "secondary-container": "#dce2f3",
              "on-tertiary-fixed": "#341100",
              "on-secondary-container": "#5e6572",
              "surface-variant": "#dce2f7",
              "inverse-primary": "#b6c4ff",
              "tertiary-fixed-dim": "#ffb691",
              "surface": "#f9f9ff",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#b6c4ff",
              "secondary-fixed-dim": "#c0c7d6",
              "error": "#ba1a1a",
              "surface-tint": "#4059aa",
              "inverse-surface": "#293040",
              "surface-container": "#e9edff",
              "on-tertiary-fixed-variant": "#773205",
              "on-surface": "#141b2b",
              "surface-container-highest": "#dce2f7",
              "on-error": "#ffffff",
              "surface-dim": "#d3daef",
              "primary": "#00236f",
              "on-background": "#141b2b",
              "primary-container": "#1e3a8a",
              "on-secondary-fixed-variant": "#404754",
              "on-primary": "#ffffff",
              "tertiary": "#4b1c00",
              "inverse-on-surface": "#edf0ff",
              "on-primary-container": "#90a8ff",
              "skills-purple": "#8B5CF6",
              "skills-tint": "rgba(139, 92, 246, 0.1)"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "3xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-radial-gradient {
        background: radial-gradient(circle at center, #ffffff 0%, #f9f9ff 100%);
      }
      .streak-card-glow {
        box-shadow: 0 8px 32px rgba(20, 27, 43, 0.04);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell Implementation) -->
<header class="w-full top-0 sticky bg-[#F9F9FF] dark:bg-[#0F0F14] flex items-center justify-between px-6 py-4 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#1E3A8A] dark:text-blue-400" data-icon="close">close</span>
</div>
<h1 class="font-headline font-semibold text-lg tracking-tight text-[#1E3A8A] dark:text-blue-400">Intentional</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<main class="flex-1 px-8 pb-32 pt-10 bg-radial-gradient flex flex-col items-center max-w-lg mx-auto w-full">
<!-- Success Animation/Icon -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-skills-purple opacity-10 blur-3xl rounded-full scale-150"></div>
<div class="relative w-24 h-24 rounded-full bg-skills-purple flex items-center justify-center text-white shadow-xl">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Headline & Hero Stats -->
<div class="text-center space-y-2 mb-10">
<h2 class="text-3xl font-bold tracking-tight text-on-surface">Session Complete</h2>
<div class="pt-2">
<span class="text-6xl font-extrabold tracking-tighter text-on-surface">2h 32m</span>
</div>
<!-- Goal Credit Chip -->
<div class="flex justify-center pt-4">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-skills-tint border border-skills-purple/10">
<span class="w-2 h-2 rounded-full bg-skills-purple"></span>
<span class="text-sm font-bold tracking-wide uppercase text-skills-purple">Skills</span>
</div>
</div>
</div>
<!-- Streak Section -->
<div class="w-full mb-8">
<div class="bg-surface-container-lowest rounded-3xl p-6 streak-card-glow border border-outline-variant/10 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-orange-50 flex items-center justify-center text-orange-500">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div>
<p class="text-[0.6875rem] font-bold tracking-widest uppercase text-outline">Consistency</p>
<h3 class="text-xl font-bold text-on-surface">8 DAY STREAK</h3>
</div>
</div>
<div class="text-right">
<span class="text-sm font-medium text-orange-600 bg-orange-50 px-3 py-1 rounded-full">+1</span>
</div>
</div>
</div>
<!-- Reflection Section -->
<div class="w-full space-y-3 mb-12">
<label class="text-[0.6875rem] font-bold tracking-widest uppercase text-outline ml-1">Daily Reflection</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-2xl p-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container/20 transition-all resize-none font-medium" placeholder="Add a session note..." rows="4"></textarea>
<div class="absolute bottom-4 right-4 text-outline/40">
<span class="material-symbols-outlined text-xl">edit_note</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area (Shell Implementation) -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-6 pb-10">
<button class="flex items-center justify-center bg-[#1E3A8A] dark:bg-blue-700 text-white rounded-full w-full py-4 shadow-lg hover:bg-[#1E3A8A]/90 transition-transform active:scale-[0.98] duration-200">
<span class="font-headline font-bold text-sm tracking-widest uppercase">Back to Today</span>
<span class="material-symbols-outlined ml-2" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</body></html>
