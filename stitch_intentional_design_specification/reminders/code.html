<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reminders - Intentional</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#00164e",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#dce2f3",
                        "tertiary": "#4b1c00",
                        "on-background": "#141b2b",
                        "secondary-container": "#dce2f3",
                        "inverse-primary": "#b6c4ff",
                        "primary": "#00236f",
                        "on-surface-variant": "#444651",
                        "surface-container-low": "#f1f3ff",
                        "on-error": "#ffffff",
                        "outline-variant": "#c5c5d3",
                        "surface-container-highest": "#dce2f7",
                        "secondary-fixed-dim": "#c0c7d6",
                        "secondary": "#585f6c",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "surface-dim": "#d3daef",
                        "on-tertiary-fixed-variant": "#773205",
                        "on-secondary-fixed": "#151c27",
                        "on-secondary-fixed-variant": "#404754",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#264191",
                        "primary-container": "#1e3a8a",
                        "error": "#ba1a1a",
                        "inverse-surface": "#293040",
                        "surface-tint": "#4059aa",
                        "on-secondary-container": "#5e6572",
                        "on-tertiary-container": "#f39461",
                        "on-surface": "#141b2b",
                        "tertiary-container": "#6e2c00",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#dce2f7",
                        "tertiary-fixed": "#ffdbcb",
                        "tertiary-fixed-dim": "#ffb691",
                        "surface-container-high": "#e1e8fd",
                        "on-primary-container": "#90a8ff",
                        "primary-fixed-dim": "#b6c4ff",
                        "outline": "#757682",
                        "surface-bright": "#f9f9ff",
                        "inverse-on-surface": "#edf0ff",
                        "on-tertiary-fixed": "#341100",
                        "surface-container": "#e9edff",
                        "primary-fixed": "#dce1ff"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ios-switch {
            appearance: none;
            width: 51px;
            height: 31px;
            background: #e9e9ea;
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ios-switch:checked {
            background: #22c55e;
        }
        .ios-switch::before {
            content: '';
            position: absolute;
            width: 27px;
            height: 27px;
            background: white;
            border-radius: 100px;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .ios-switch:checked::before {
            transform: translateX(20px);
        }
        .time-picker-capsule {
            background: #f1f3ff;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 500;
            color: #1e3a8a;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#F9F9FF] dark:bg-[#0F0F14] flex items-center justify-between px-4 h-16 w-full docked full-width top-0 z-50">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity duration-200 scale-95 active:transition-transform">
<span class="material-symbols-outlined text-[#1E3A8A] dark:text-blue-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] headline-md semibold tracking-tight text-[#1E3A8A] dark:text-blue-400 text-xl font-bold">Reminders</h1>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Content Canvas -->
<main class="flex-1 px-4 py-6 max-w-2xl mx-auto w-full mb-32">
<!-- Header Section -->
<div class="mb-8">
<p class="text-on-surface-variant body-md opacity-70">Schedule your rituals to maintain the rhythm of your sanctuary.</p>
</div>
<!-- Reminders List -->
<div class="space-y-4">
<!-- Physique: Gym Session -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(20,27,43,0.03)] border-l-4 border-[#4A9EED]">
<div class="flex flex-col">
<span class="label-sm font-bold tracking-[0.5pt] uppercase text-[#4A9EED] text-[10px] mb-1">Physique</span>
<span class="title-lg font-medium text-on-surface">Gym Session</span>
</div>
<div class="flex items-center gap-4">
<div class="time-picker-capsule">07:00</div>
<input checked="" class="ios-switch" type="checkbox"/>
</div>
</div>
<!-- Skills: Read technical docs -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(20,27,43,0.03)] border-l-4 border-[#8B5CF6]">
<div class="flex flex-col">
<span class="label-sm font-bold tracking-[0.5pt] uppercase text-[#8B5CF6] text-[10px] mb-1">Skills</span>
<span class="title-lg font-medium text-on-surface">Read technical docs</span>
</div>
<div class="flex items-center gap-4">
<div class="time-picker-capsule">08:30</div>
<input checked="" class="ios-switch" type="checkbox"/>
</div>
</div>
<!-- Finances: Budget Review -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(20,27,43,0.03)] border-l-4 border-[#22C55E]">
<div class="flex flex-col">
<span class="label-sm font-bold tracking-[0.5pt] uppercase text-[#22C55E] text-[10px] mb-1">Finances</span>
<span class="title-lg font-medium text-on-surface">Budget Review</span>
</div>
<div class="flex items-center gap-4">
<div class="time-picker-capsule">19:00</div>
<input class="ios-switch" type="checkbox"/>
</div>
</div>
<!-- Skills: LeetCode practice -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(20,27,43,0.03)] border-l-4 border-[#8B5CF6]">
<div class="flex flex-col">
<span class="label-sm font-bold tracking-[0.5pt] uppercase text-[#8B5CF6] text-[10px] mb-1">Skills</span>
<span class="title-lg font-medium text-on-surface">LeetCode practice</span>
</div>
<div class="flex items-center gap-4">
<div class="time-picker-capsule">20:00</div>
<input checked="" class="ios-switch" type="checkbox"/>
</div>
</div>
<!-- Mind: Meditation -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(20,27,43,0.03)] border-l-4 border-[#F59E0B]">
<div class="flex flex-col">
<span class="label-sm font-bold tracking-[0.5pt] uppercase text-[#F59E0B] text-[10px] mb-1">Mind</span>
<span class="title-lg font-medium text-on-surface">Meditation</span>
</div>
<div class="flex items-center gap-4">
<div class="time-picker-capsule">06:30</div>
<input checked="" class="ios-switch" type="checkbox"/>
</div>
</div>
</div>
<!-- Add New Placeholder -->
<button class="w-full mt-8 p-4 border-2 border-dashed border-outline-variant/30 rounded-xl flex items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="font-medium">Add New Reminder</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#F9F9FF]/80 dark:bg-[#0F0F14]/80 backdrop-blur-xl shadow-[0_8px_32px_rgba(20,27,43,0.06)] rounded-t-[24pt]">
<!-- Sanctuary Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 p-3 hover:text-[#1E3A8A] dark:hover:text-blue-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined mb-1" data-icon="bedtime">bedtime</span>
<span class="font-['Inter'] label-sm bold tracking-[0.5pt] uppercase text-[10px]">Sanctuary</span>
</a>
<!-- Focus Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 p-3 hover:text-[#1E3A8A] dark:hover:text-blue-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined mb-1" data-icon="timer">timer</span>
<span class="font-['Inter'] label-sm bold tracking-[0.5pt] uppercase text-[10px]">Focus</span>
</a>
<!-- Growth Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 p-3 hover:text-[#1E3A8A] dark:hover:text-blue-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined mb-1" data-icon="auto_graph">auto_graph</span>
<span class="font-['Inter'] label-sm bold tracking-[0.5pt] uppercase text-[10px]">Growth</span>
</a>
<!-- Rituals Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#1E3A8A] text-white rounded-full p-3 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings_suggest" style="font-variation-settings: 'FILL' 1;">settings_suggest</span>
<span class="font-['Inter'] label-sm bold tracking-[0.5pt] uppercase text-[10px]">Rituals</span>
</a>
</nav>
</body></html>
