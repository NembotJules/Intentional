<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#b6c4ff",
              "outline": "#757682",
              "outline-variant": "#c5c5d3",
              "inverse-primary": "#b6c4ff",
              "on-surface": "#141b2b",
              "surface-container-low": "#f1f3ff",
              "primary": "#00236f",
              "inverse-on-surface": "#edf0ff",
              "on-primary-fixed": "#00164e",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb691",
              "on-error": "#ffffff",
              "on-tertiary-container": "#f39461",
              "on-primary-fixed-variant": "#264191",
              "surface-tint": "#4059aa",
              "tertiary-fixed": "#ffdbcb",
              "tertiary-container": "#6e2c00",
              "on-secondary-fixed-variant": "#404754",
              "on-primary-container": "#90a8ff",
              "surface-container-high": "#e1e8fd",
              "surface-variant": "#dce2f7",
              "secondary-container": "#dce2f3",
              "error-container": "#ffdad6",
              "surface-container": "#e9edff",
              "surface": "#f9f9ff",
              "on-tertiary-fixed": "#341100",
              "on-primary": "#ffffff",
              "inverse-surface": "#293040",
              "background": "#f9f9ff",
              "surface-container-lowest": "#ffffff",
              "error": "#ba1a1a",
              "secondary-fixed": "#dce2f3",
              "on-secondary-fixed": "#151c27",
              "primary-container": "#1e3a8a",
              "on-tertiary-fixed-variant": "#773205",
              "surface-bright": "#f9f9ff",
              "secondary-fixed-dim": "#c0c7d6",
              "on-surface-variant": "#444651",
              "surface-container-highest": "#dce2f7",
              "surface-dim": "#d3daef",
              "on-background": "#141b2b",
              "on-error-container": "#93000a",
              "tertiary": "#4b1c00",
              "secondary": "#585f6c",
              "on-secondary-container": "#5e6572",
              "primary-fixed": "#dce1ff",
              "on-tertiary": "#ffffff",
              "skills-accent": "#8B5CF6",
              "deep-dark": "#0F0F14"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .timer-glow {
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0F0F14] text-white font-body min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="flex justify-center items-center px-8 py-4 w-full bg-[#0F0F14] font-['SF_Pro','Inter'] text-sm tracking-[0.5pt] uppercase font-bold docked full-width top-0">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-violet-500" data-icon="lock">lock</span>
<span class="text-violet-400 font-semibold tracking-widest">Deep Focus</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8">
<!-- Goal Identifier Section -->
<div class="flex flex-col items-center gap-4 mb-16">
<div class="px-4 py-1.5 rounded-full border border-[#8B5CF6] bg-[#8B5CF6]/10">
<span class="text-[#8B5CF6] text-[0.6875rem] font-bold tracking-[0.5pt] uppercase">Skills</span>
</div>
<h1 class="text-white/60 font-headline text-sm tracking-[2pt] uppercase font-medium">Deep Focus Session</h1>
</div>
<!-- Hero Element: FocusTimerRing -->
<div class="relative flex items-center justify-center w-[260pt] h-[260pt]">
<!-- Progress Ring Background -->
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<circle class="text-white/5" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-width="2.5"></circle>
<!-- Progress Fill with Gradient -->
<defs>
<lineargradient id="ringGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#8B5CF6"></stop>
<stop offset="100%" stop-color="#C084FC"></stop>
</lineargradient>
</defs>
<circle class="timer-glow" cx="50" cy="50" fill="transparent" r="46" stroke="url(#ringGradient)" stroke-dasharray="289" stroke-dashoffset="80" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<!-- Center Content -->
<div class="flex flex-col items-center">
<span class="text-[72pt] font-extralight tracking-tight leading-none text-white">24:32</span>
<span class="text-[13pt] text-white/50 font-medium mt-2 tracking-wide uppercase">remaining</span>
</div>
</div>
<!-- Controls Section -->
<div class="mt-20 flex gap-6 w-full max-w-sm">
<button class="flex-1 py-4 px-8 rounded-full border border-[#8B5CF6]/40 bg-[#8B5CF6]/5 text-[#8B5CF6] font-bold text-sm tracking-widest uppercase hover:bg-[#8B5CF6]/10 transition-colors">
                Pause
            </button>
<button class="flex-1 py-4 px-8 rounded-full border border-[#DC2626]/40 bg-[#DC2626]/5 text-[#DC2626] font-bold text-sm tracking-widest uppercase hover:bg-[#DC2626]/10 transition-colors">
                End
            </button>
</div>
</main>
<!-- Footer: AppBlockBadge -->
<footer class="pb-12 flex justify-center w-full">
<div class="flex items-center gap-3 px-5 py-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-white/60 text-lg" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-white/80 text-[0.6875rem] font-bold tracking-[0.1em] uppercase">Apps Blocked</span>
</div>
</footer>
<!-- Shared Bottom Shell (Hidden for Task Focus Screen but contextually mapped for system integrity) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center gap-12 px-6 bg-transparent pb-10 hidden">
<div class="text-white/40 p-4">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
</div>
<div class="bg-white/10 backdrop-blur-md rounded-full p-4">
<span class="material-symbols-outlined" data-icon="stop">stop</span>
</div>
</nav>
</body></html>
